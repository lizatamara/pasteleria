spring.application.name=api-gateway

# Puerto del Gateway
server.port=8080

# Configuracion de EUREKA
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.server.webflux.routes[0].id=administrador-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://administrador-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/administradores/**

spring.cloud.gateway.server.webflux.routes[1].id=cliente-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://cliente-service
